name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref so rapid pushes don't pile up runners or
# race two docker-push jobs into out-of-order publishes. Tag refs get their own
# group and are never cancelled, so a release publish always completes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Locked-down default for all jobs. docker-push overrides with packages: write.
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run lint

  # ─────────────────────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Build (TypeScript compilation)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run build

  # ─────────────────────────────────────────────────────────────
  # Client Tests (ESLint + Jest + TypeScript build)
  # ─────────────────────────────────────────────────────────────
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

  # ─────────────────────────────────────────────────────────────
  # Integration Tests (MySQL via Docker Compose)
  # ─────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate ephemeral MySQL test passwords
        run: |
          {
            echo "MYSQL_TEST_ROOT_PASSWORD=$(openssl rand -hex 24)"
            echo "MYSQL_TEST_PASSWORD=$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      # --exit-code-from already implies --abort-on-container-exit; passing both
      # is redundant in newer compose versions.
      - name: Run integration tests via docker-compose
        run: docker compose -f docker/docker-compose.test.yml up --build --exit-code-from test-runner

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v --remove-orphans

  # ─────────────────────────────────────────────────────────────
  # E2E Tests (Playwright — UI flows against host-run API + Vite, MySQL via Docker)
  # ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            e2e/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start MySQL (E2E stack)
        run: docker compose -p fullstack-e2e -f docker/docker-compose.e2e.yml up -d --wait

      - name: Run Playwright tests
        working-directory: e2e
        env:
          CI: 'true'
        run: npm test

      - name: Tear down MySQL stack
        if: always()
        run: docker compose -p fullstack-e2e -f docker/docker-compose.e2e.yml down -v --remove-orphans

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Docker Build
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [client-tests, integration-tests, e2e-tests]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t expense-management-server:${{ github.sha }} .

  # ─────────────────────────────────────────────────────────────
  # Docker Push (main-branch pushes and version tags)
  # ─────────────────────────────────────────────────────────────
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker-build
    # main pushes publish the immutable SHA tag; a v* tag push additionally moves
    # :latest and the release tag (handled in the run step below). Without the tag
    # ref here, the tag-release branch in that step is unreachable dead code.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        # Push the immutable SHA tag on every main-branch build. Move :latest
        # only on tagged releases so :latest never points at an arbitrary commit.
        run: |
          # OCI repository names must be lowercase; the owner (github.repository_owner)
          # may contain uppercase, so lowercase it with bash parameter expansion.
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/expense-management-server
          IMAGE_TAG=${{ github.sha }}

          docker build -f docker/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:$RELEASE_TAG
            docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
            docker push $IMAGE_NAME:$RELEASE_TAG
            docker push $IMAGE_NAME:latest
          fi
