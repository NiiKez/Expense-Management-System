name: Security

# Security scanning runs in its own workflow, separate from ci.yml, so that:
#  - a weekly schedule can re-scan unchanged code for newly-disclosed CVEs
#    without spinning up the full build/test matrix;
#  - vulnerability drift (a new CVE against an unchanged dependency) turns the
#    Security signal red without blocking unrelated PRs on the CI signal;
#  - the `security-events: write` token stays isolated from ci.yml's publish job.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Mondays 06:17 UTC — off-peak (dodges GitHub's top-of-hour scheduler
    # congestion) and surfaces fresh results at the start of the week. Scheduled
    # runs always target the default branch HEAD only.
    - cron: '17 6 * * 1'
  workflow_dispatch: {}

# Distinct group prefix so this never collides with ci.yml's `ci-${{ github.ref }}`
# (group keys are global per repo). event_name keeps a push and a scheduled run on
# the same ref from cancelling each other; only redundant PR pushes collapse.
concurrency:
  group: security-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege by default; each job escalates only what it needs.
permissions:
  contents: read

# NB: no top-level `env`/`defaults` and no workflow-level write permissions —
# the OpenSSF Scorecard publish step (publish_results) rejects workflows that
# carry them. NODE_VERSION therefore lives at job level on the only job using it.

jobs:
  # ─────────────────────────────────────────────────────────────
  # CodeQL — SAST over application code (JS/TS) and the workflow files
  # themselves (actions). Hard signal: fails only if CodeQL errors; findings
  # surface as code-scanning alerts.
  # ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          # Trigger paths-ignore only gates whether the workflow runs; analysis
          # exclusions must live here so checked-in build output isn't analysed.
          config: |
            paths-ignore:
              - '**/dist/**'
              - '**/build/**'
              - '**/*.min.js'
              - 'e2e/playwright-report/**'
              - 'e2e/test-results/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────────────────────
  # Build the server image once; Trivy and Syft scan the same artifact.
  # ─────────────────────────────────────────────────────────────
  build-image:
    name: Build image (for scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build server image
        run: |
          docker build -f docker/Dockerfile \
            --build-arg IMAGE_REVISION=${{ github.sha }} \
            -t ems-server:${{ github.sha }} .

      - name: Export image to tarball
        run: docker save ems-server:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scan-image
          path: image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Trivy image scan — OS + library CVEs in the shipped image. Advisory:
  # never blocks (new CVEs drift daily), but every finding lands in the
  # Security tab via SARIF.
  # ─────────────────────────────────────────────────────────────
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build-image
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    env:
      # Prefer the AWS mirror to dodge GHCR anonymous pull limits on the Trivy DB.
      TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,ghcr.io/aquasecurity/trivy-db
      TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scan-image

      - name: Load image
        run: docker load -i image.tar

      - name: Trivy image scan (SARIF, advisory)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ems-server:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
          exit-code: '0'

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─────────────────────────────────────────────────────────────
  # Trivy repo scan — dependency CVEs/licenses over the lockfiles, plus IaC
  # misconfiguration over the Dockerfiles and compose files. Advisory; SARIF
  # uploaded under distinct categories (same tool+category may not be uploaded
  # twice for one commit).
  # ─────────────────────────────────────────────────────────────
  trivy-repo:
    name: Trivy filesystem + config scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    env:
      TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,ghcr.io/aquasecurity/trivy-db
      TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy filesystem scan (vuln + license)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
          scanners: vuln,license
          exit-code: '0'

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy config / IaC misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          exit-code: '0'

      - name: Upload config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ─────────────────────────────────────────────────────────────
  # Hadolint — Dockerfile linting. Hard-fail on error-level rules (in our
  # control); warnings/info still surface as advisory SARIF.
  # ─────────────────────────────────────────────────────────────
  hadolint:
    name: Hadolint (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/Dockerfile
            name: dockerfile
          - dockerfile: docker/Dockerfile.test
            name: dockerfile-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          format: sarif
          output-file: hadolint-${{ matrix.name }}.sarif
          failure-threshold: error
          no-fail: false

      - name: Upload hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: hadolint-${{ matrix.name }}.sarif
          category: hadolint-${{ matrix.name }}

  # ─────────────────────────────────────────────────────────────
  # Secret scan — gitleaks (license-free, run as a digest-pinned container).
  # Hard-fail: a committed secret must block. Full history on push/schedule,
  # PR diff on pull_request. Allowlist lives in .gitleaks.toml.
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          # PRs scan only the diff range (fast, no re-flagging accepted history);
          # push/schedule sweep the full history so secrets later "removed" but
          # still reachable in history are caught.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS="--all"
          fi
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git /repo \
            --config /repo/.gitleaks.toml \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --redact \
            --exit-code 1 \
            --log-opts="$LOG_OPTS"

      - name: Upload gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Fail on detected secrets
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::gitleaks detected potential secrets — see Security › Code scanning"
          exit 1

  # ─────────────────────────────────────────────────────────────
  # Dependency review — gates PRs that introduce vulnerable dependencies.
  # PR-only (needs a base↔head diff from the Dependency Graph). Hard-fail on
  # high/critical newly-introduced runtime vulns.
  # ─────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime
          comment-summary-in-pr: on-failure

  # ─────────────────────────────────────────────────────────────
  # npm audit — advisory dependency-vuln visibility per workspace. Non-gating
  # (Dependabot remediates; dependency-review is the PR gate).
  # ─────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (${{ matrix.workspace }})
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      NODE_VERSION: '20'
    strategy:
      fail-fast: false
      matrix:
        workspace: [server, client, e2e]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (${{ matrix.workspace }})
        working-directory: ${{ matrix.workspace }}
        continue-on-error: true
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────
  # SBOM — CycloneDX SBOMs for the source tree and the shipped image,
  # uploaded as artifacts. Informational, non-gating.
  # ─────────────────────────────────────────────────────────────
  sbom:
    name: SBOM (source + image)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-image
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scan-image

      - name: Load image
        run: docker load -i image.tar

      - name: Generate source SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.source.cyclonedx.json
          artifact-name: sbom.source.cyclonedx.json

      - name: Generate image SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ems-server:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.image.cyclonedx.json
          artifact-name: sbom.image.cyclonedx.json

  # ─────────────────────────────────────────────────────────────
  # OpenSSF Scorecard — rates the repository's security posture (pinned deps,
  # branch protection, token permissions, dangerous workflow patterns, …) and
  # publishes the result. Default branch only.
  # ─────────────────────────────────────────────────────────────
  scorecard:
    name: OpenSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      id-token: write # publish results to the public OpenSSF API for the badge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard.sarif
          category: scorecard
