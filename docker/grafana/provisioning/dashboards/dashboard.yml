apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: "Expense Management"
    type: file
    disableDeletion: true
    editable: false
    # UI edits are never persisted back to the provisioned file.
    allowUiUpdates: false
    # The dashboard JSON is static and checked in; no need to rescan every 10s.
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
