name: ${COMPOSE_PROJECT_NAME:-fullstack}

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      # Bind to localhost by default. Override APP_BIND_HOST=0.0.0.0 only when
      # publishing publicly via a reverse proxy.
      - "${APP_BIND_HOST:-127.0.0.1}:${PORT:-3000}:3000"
    env_file:
      - ../server/.env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - NODE_ENV=production
      # Assert the production auth posture in-compose: even though env_file loads
      # the dev server/.env (which may carry ALLOW_STUB_AUTH=true), pin it false
      # here so the stub path can never activate in this stack. Stub auth requires
      # dev + loopback + this flag; this removes the reliance on env precedence.
      - ALLOW_STUB_AUTH=false
      - METRICS_PORT=9464
      - METRICS_HOST=0.0.0.0
    depends_on:
      mysql:
        condition: service_healthy
    # Mirror the image's HEALTHCHECK here so the compose-level service_healthy
    # gate (prometheus.depends_on relies on it) has a source of truth in this
    # file, independent of whichever image/Dockerfile is built.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - app_uploads:/app/dist/uploads
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 512m
    cpus: 2.0
    # Cap container log files so the default json-file driver can't fill the
    # host disk (promtail still ships these logs to Loki for retention).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  mysql:
    image: mysql:8.0@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
    # No host port mapping — MySQL is reachable only on the internal Docker
    # network (app connects via DB_HOST=mysql). If you need host access during
    # local debugging, add a port override in docker-compose.override.yml.
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${DB_NAME:-expense_management}
      MYSQL_USER: ${DB_USER:-expense_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/stored-procedures.sql:/docker-entrypoint-initdb.d/02-stored-procedures.sql:ro
      - mysql_data:/var/lib/mysql
    # `mysqladmin ping` returns OK during the temp-server init phase, before
    # init scripts have run and the app user/database actually exist. Validate
    # readiness by authenticating as the app user against the target database
    # — this only succeeds once initialisation is complete.
    healthcheck:
      test:
        - CMD-SHELL
        - MYSQL_PWD="$$MYSQL_PASSWORD" mysql -h 127.0.0.1 -u "$$MYSQL_USER" -D "$$MYSQL_DATABASE" -e 'SELECT 1' >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    pids_limit: 128
    mem_limit: 1g
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1@sha256:2659f4c2ebb718e7695cb9b25ffa7d6be64db013daba13e05c875451cf51b0d3
    init: true
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Cap retention by both age and on-disk size so prometheus_data can't
      # silently fill the volume. Whichever limit is hit first triggers GC.
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=2GB
      # Keep the lifecycle/admin HTTP APIs disabled. These are kingpin toggle
      # flags (--[no-]…); the `=false` form is rejected ("unexpected false"), so
      # use the --no- prefix. They default to off anyway — this asserts it.
      - --no-web.enable-lifecycle
      - --no-web.enable-admin-api
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2@sha256:8b37a2f028f164ce7b9889e1765b9d6ee23fec80f871d156fbf436d6198d32b7
    init: true
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # Emit Grafana's Content-Security-Policy header (defense-in-depth vs XSS/
      # clickjacking). Safe over the loopback HTTP binding; cookie_secure is
      # intentionally NOT set — it requires TLS and would break HTTP login.
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    # Wait until the datasources are actually answering before Grafana boots and
    # runs provisioning — otherwise the provisioned datasources transiently show
    # as unreachable on a cold start. Mirrors the service_healthy gating used by
    # every other edge in this file (app→mysql, prometheus→app, promtail→loki).
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    # Headroom for concurrent Explore/LogQL queries against Loki (Grafana itself
    # idles ~100-150m with SQLite + this dashboard).
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2@sha256:8af2de1abbdd7aa92b27c9bcc96f0f4140c9096b507c77921ffddf1c6ad6c48f
    init: true
    # No host port published — Loki is an internal datasource consumed by
    # Grafana and Promtail over the Docker network. Querying happens through
    # Grafana's Explore UI, not directly.
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Read-only Docker API gateway for Promtail's container discovery. Promtail
  # needs the daemon to list containers and stream their logs; mounting the raw
  # /var/run/docker.sock into Promtail would expose the entire Docker API — every
  # container's environment (incl. the MySQL/Grafana passwords) via
  # /containers/{id}/json, plus a container-escape path. This proxy exposes ONLY
  # the read endpoints Promtail needs (container list/inspect/logs) and refuses
  # every write/exec/create call (POST=0), so no log-shipping process ever
  # touches the socket. The proxy is the single component holding the socket and
  # has no write capability of its own.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0@sha256:9e4b9e7517a6b660f2cc903a19b257b1852d5b3344794e3ea334ff00ae677ac2
    environment:
      # CONTAINERS+NETWORKS are the read endpoints Promtail's docker_sd needs
      # (list/inspect/logs, plus network labels). Everything else stays denied;
      # POST=0 blocks every write/create/exec call.
      - CONTAINERS=1
      - NETWORKS=1
      - POST=0
      - EXEC=0
      - IMAGES=0
      - VOLUMES=0
      - INFO=0
      - SERVICES=0
      - TASKS=0
      - SWARM=0
      - SYSTEM=0
      - SECRETS=0
      - CONFIGS=0
      - AUTH=0
      - BUILD=0
      - COMMIT=0
      - DISTRIBUTION=0
      - NODES=0
      - PLUGINS=0
      - SESSION=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Not read_only: the entrypoint regenerates haproxy.cfg from its bundled
    # template into /usr/local/etc/haproxy at startup. cap_drop ALL +
    # no-new-privileges + the read-only socket + POST=0 keep it contained.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    pids_limit: 64
    mem_limit: 64m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2@sha256:cb4990801ec58975c5e231057c2bcf204c85fac428eec65ad66e0016c64b9608
    # Discovers containers and tails their logs through the Docker API, but only
    # via the read-only docker-socket-proxy — Promtail itself never mounts the
    # socket, so it cannot reach the daemon's write/exec endpoints.
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-fullstack}
    depends_on:
      loki:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    # Non-root + read-only root FS. Positions persist on the promtail_positions
    # volume mounted at /tmp (mode 1777) — the only path Promtail writes to now
    # that it no longer holds the socket.
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  app_uploads:
  mysql_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
