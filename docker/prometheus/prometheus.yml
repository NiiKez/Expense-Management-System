global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: expense-management

scrape_configs:
  - job_name: "expense-management-api"
    static_configs:
      - targets: ["app:9464"]

  # Scrape the monitoring stack itself so you can detect a broken pipeline
  # (e.g. Loki dropping logs, Grafana down) from the same dashboard.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "promtail"
    static_configs:
      - targets: ["promtail:9080"]

  - job_name: "grafana"
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
