auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 360h = 15d, matching Prometheus's 15d metric retention so log/metric
  # correlation survives the full window (the old 168h kept logs only 7 days).
  # Loki has no on-disk size cap (unlike Prometheus's retention.size)
  # — the source container logs are bounded by the json-file driver (10m x 3) and
  # this window keeps the loki_data volume in check.
  retention_period: 360h
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h

analytics:
  reporting_enabled: false
